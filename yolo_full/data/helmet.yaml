# 安全帽检测数据集配置文件
# Safety Helmet Detection Dataset Configuration

# 数据集路径
path: ../data  # 数据集根目录
train: processed/train/images  # 训练集图片路径（相对于path）
val: processed/val/images      # 验证集图片路径
test: processed/test/images    # 测试集图片路径（可选）

# 类别数量
nc: 3

# 类别名称
names:
  0: wearing_helmet  # 佩戴安全帽
  1: no_helmet       # 未佩戴安全帽
  2: person          # 人员

# 类别中文名称（用于显示）
names_zh:
  0: 佩戴安全帽
  1: 未佩戴安全帽
  2: 人员

# 数据集信息
dataset_info:
  name: Safety Helmet Detection Dataset
  version: 1.0
  description: 施工现场安全帽佩戴检测数据集
  author: Your Name
  date: 2025-10-31
  total_images: 5000
  train_images: 3500
  val_images: 1000
  test_images: 500

# 数据增强配置（训练时）
augmentation:
  hsv_h: 0.015        # 色调调整范围
  hsv_s: 0.7          # 饱和度调整范围
  hsv_v: 0.4          # 明度调整范围
  degrees: 10.0       # 旋转角度范围 (+/- deg)
  translate: 0.1      # 平移范围 (+/- fraction)
  scale: 0.5          # 缩放范围 (+/- gain)
  shear: 0.0          # 剪切角度范围 (+/- deg)
  perspective: 0.0    # 透视变换范围 (+/- fraction)
  flipud: 0.0         # 上下翻转概率
  fliplr: 0.5         # 左右翻转概率
  mosaic: 1.0         # Mosaic增强概率
  mixup: 0.0          # Mixup增强概率

# 类别权重（用于处理类别不平衡，可选）
class_weights:
  - 1.0  # wearing_helmet
  - 2.0  # no_helmet（更重要）
  - 0.5  # person

# 数据统计信息（用于归一化）
statistics:
  mean: [0.485, 0.456, 0.406]  # RGB均值
  std: [0.229, 0.224, 0.225]   # RGB标准差

# 数据来源
sources:
  - name: Public Dataset
    url: https://www.kaggle.com/datasets/...
    images: 3000
  - name: Self-collected
    description: 施工现场采集
    images: 2000

# 备注
notes: |
  - 数据集包含不同场景、光照、角度的安全帽图片
  - 标注格式：YOLO格式（txt文件）
  - 每个类别至少1000张图片
  - 建议使用数据增强提升模型鲁棒性


